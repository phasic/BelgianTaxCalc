# Builds the Vite app with Firebase web config from repository secrets (not stored in git),
# then deploys static output to GitHub Pages and the Cloud Function to Firebase.
#
# One-time repo setup:
#   Settings → Secrets and variables → Actions → New repository secret — add each:
#     VITE_FIREBASE_API_KEY
#     VITE_FIREBASE_AUTH_DOMAIN
#     VITE_FIREBASE_PROJECT_ID
#     VITE_FIREBASE_STORAGE_BUCKET
#     VITE_FIREBASE_MESSAGING_SENDER_ID
#     VITE_FIREBASE_APP_ID
#     FIREBASE_SERVICE_ACCOUNT   ← base64-encoded service account JSON (for function deploy)
#   Settings → Pages → Build and deployment → Source: GitHub Actions
#
# To create FIREBASE_SERVICE_ACCOUNT:
#   Firebase console → Project settings → Service accounts → Generate new private key
#   Then: base64 -i serviceAccount.json | pbcopy  (paste as secret value)

name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build with Firebase env (from secrets)
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-functions:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Write Firebase service account
        run: echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" | base64 -d > $HOME/service-account.json

      - name: Deploy Cloud Functions
        run: npx firebase-tools deploy --only functions --project belgiantaxcalc --region europe-west1
        env:
          GOOGLE_APPLICATION_CREDENTIALS: $HOME/service-account.json
